<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Forgery Detector</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 760px; margin: 36px auto; line-height: 1.6; color: #222; }
        h1 { color: #0d4f8b; }
        .card { padding: 24px; border: 1px solid #ddd; border-radius: 12px; background: #fafafa; }
        .error { color: #b00020; margin-bottom: 16px; }
        button { background: #0d4f8b; color: #fff; border: none; padding: 12px 18px; cursor: pointer; border-radius: 6px; }
        button:hover { background: #0a3a6a; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Upload ID Document</h1>
        <p>Select a PNG or JPEG image of an ID document to generate a fraud risk report.</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form action="/analyze" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/png,image/jpeg" required />
            <div style="margin-top: 18px;"><button type="submit">Analyze Document</button></div>
        </form>
    </div>
</body>
</html>
